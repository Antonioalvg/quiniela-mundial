  .chip:hover{border-color:var(--green)}
  .chip.alt{background:transparent}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);

async function sbSel(table, q=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${q}`,{headers:H});
  if(!r.ok) throw new Error('GET '+table+' '+r.status);
  return r.json();
}
async function sbUpsert(table, rows){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',
    headers:{...H, Prefer:'resolution=merge-duplicates,return=minimal'}, body:JSON.stringify(rows)});
  if(!r.ok) throw new Error('UPSERT '+table+' '+r.status+' '+await r.text());
  return true;
}
async function sbPatch(table, q, patch){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${q}`,{method:'PATCH',
    headers:{...H, Prefer:'return=minimal'}, body:JSON.stringify(patch)});
  if(!r.ok) throw new Error('PATCH '+table+' '+r.status);
  return true;
}
async function sbDelete(table, q){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${q}`,{method:'DELETE',headers:{...H, Prefer:'return=minimal'}});

function pad(n){return String(n).padStart(2,'0');}
function buildMatches(){
  MATCHES=[...groupMatches(), ...(META.knockout||[])];
  MATCHES.forEach(m=>{
    if(META.kickoffs && META.kickoffs[m.id]) m.kickoff=META.kickoffs[m.id];
    const r=RESULTS[m.id];
    m.status = r? r.status : 'scheduled';
    m.hg = r? r.hg : null; m.ag = r? r.ag : null; m.outcome = r? r.outcome : null;
  });
}
async function loadCore(){

/* ---------- PRONÓSTICOS ---------- */
function renderPredictions(kind){
  const body=$('#tabbody');
  const list = kind==='grupos'? MATCHES.filter(m=>m.phase==='grupos') : knockoutMatches();
  if(kind==='final' && list.length===0){ body.innerHTML=`<div class="card"><p class="muted">La ronda final se habilita cuando el admin cierre la fase de grupos. Aquí aparecerán los clasificados, fechas y cruces.</p></div>`; return; }
  body.innerHTML=`<div class="legend" style="margin-bottom:4px">
      <span><b style="color:var(--L)">L</b> Local</span><span><b style="color:var(--E)">E</b> Empate</span><span><b style="color:var(--V)">V</b> Visita</span></div>
    <div class="tiny muted" style="margin:0 2px 12px">Toca para elegir; toca de nuevo para quitar. Se guarda solo y se bloquea al iniciar el partido · 1 pt por acierto.</div>
    <div id="mlist"></div>`;
  const cont=$('#mlist');
  if(kind==='grupos'){
    list.slice().sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff)).forEach(m=>cont.appendChild(matchCard(m)));
  }else{
    [['16avos','Dieciseisavos'],['8vos','Octavos'],['4tos','Cuartos'],['semi','Semifinales'],['3er','Tercer lugar'],['final','Final']].forEach(([ph,lbl])=>{
      const rm=list.filter(m=>m.phase===ph); if(rm.length){cont.appendChild(el(`<div class="grp-h">${lbl}</div>`));rm.slice().sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff)).forEach(m=>cont.appendChild(matchCard(m)));} });
  }
}
function matchCard(m){
  const locked=isLocked(m), ko=m.phase!=='grupos', my=PRED[m.id]||null;
  const node=el(`<div class="match" data-id="${m.id}"></div>`);
  let statusPill=`<span class="pill lock">⏳ ${fmtKick(m.kickoff)}</span>`;
  if(m.status==='final') statusPill=`<span class="pill done">✓ final</span>`;
  else if(locked) statusPill=`<span class="pill live">● en juego / cerrado</span>`;
  const score=(m.hg!=null&&m.ag!=null)?`<span class="score">${m.hg} - ${m.ag}</span>`:`<span class="vs">vs</span>`;
  node.innerHTML=`
    <div class="meta"><span>${ko?(m.label||''):'Grupo '+m.group+' · J'+(m.md||'')}${m.venue?' · '+escapeHtml(m.venue):''}</span>${statusPill}</div>
    <div class="teams">
      <div class="team"><span class="flag">${flagOf(m.home)}</span><span>${escapeHtml(m.home)}</span></div>${score}
      <div class="team away"><span>${escapeHtml(m.away)}</span><span class="flag">${flagOf(m.away)}</span></div></div>`;
  const picks=el(`<div class="picks"></div>`);
  const opts= ko? [['L',m.home,flagOf(m.home)],['V',m.away,flagOf(m.away)]]
                : [['L','Local',flagOf(m.home)],['E','Empate','🤝'],['V','Visita',flagOf(m.away)]];
  if(ko) picks.style.gridTemplateColumns='1fr 1fr';
  opts.forEach(([k,lbl,ic])=>{
    const sel=my===k, correct=m.outcome&&m.status==='final'&&m.outcome===k;
    const p=el(`<div class="pick ${sel?'sel':''} ${locked?'locked':''} ${correct?'win':''}" data-k="${k}"><span>${ic||''} ${ko?escapeHtml(lbl):lbl}</span>${ko?'':`<small>${k==='L'?'gana local':k==='E'?'empate':'gana visita'}</small>`}</div>`);
    if(!locked) p.onclick=()=>togglePick(m.id,k);
    picks.appendChild(p);
  });
  node.appendChild(picks);
  if(locked && my && m.status==='final'){ const ok=m.outcome===my;
    node.appendChild(el(`<div class="tiny" style="margin-top:8px;color:${ok?'var(--green)':'var(--muted)'}">Tu pronóstico: <b>${pickLabel(m,my)}</b> · ${ok?'+1 punto ✅':'0 puntos'}</div>`)); }
  return node;
}
function pickLabel(m,k){ if(m.phase!=='grupos') return k==='L'?m.home:m.away; return k==='L'?'Local':k==='E'?'Empate':'Visita'; }
async function togglePick(mid,k){
  const removing = PRED[mid]===k;       // segundo toque al mismo = quitar
  if(removing) delete PRED[mid]; else PRED[mid]=k;
  const old=document.querySelector(`.match[data-id="${mid}"]`);
  const m=MATCHES.find(x=>x.id===mid); if(old) old.replaceWith(matchCard(m));
  try{
    if(removing) await sbDelete('predictions',`participant_id=eq.${ME.id}&match_id=eq.${mid}`);
    else await sbUpsert('predictions',{sala_code:SALA.code,participant_id:ME.id,match_id:mid,pick:k});
  }catch(e){ toast('No se pudo guardar, revisa tu conexión'); console.error(e); }
}

        <td class="r">${r.pts}/${r.played}</td><td class="r"><span class="ptsbig">${r.pts}</span></td></tr>`).join('')||'<tr><td colspan="4" class="muted">Sin participantes</td></tr>'}

/* ---------- POSICIONES DE GRUPOS ---------- */
function computeGroupTable(g){
  const teams=TEAMS.filter(t=>t.group===g).map(t=>({name:t.name,flag:t.flag,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}));
  const idx=Object.fromEntries(teams.map(t=>[t.name,t]));
  MATCHES.filter(m=>m.group===g&&m.phase==='grupos'&&m.status==='final'&&m.hg!=null).forEach(m=>{
    const h=idx[m.home],a=idx[m.away]; if(!h||!a)return;
    h.pj++;a.pj++; h.gf+=m.hg;h.gc+=m.ag;a.gf+=m.ag;a.gc+=m.hg;
    if(m.hg>m.ag){h.pg++;a.pp++;h.pts+=3;} else if(m.hg<m.ag){a.pg++;h.pp++;a.pts+=3;} else {h.pe++;a.pe++;h.pts++;a.pts++;}
  });
  teams.forEach(t=>t.dg=t.gf-t.gc);
  teams.sort((x,y)=> y.pts-x.pts || y.dg-x.dg || y.gf-x.gf || x.name.localeCompare(y.name));
  return teams;
}
function renderGroupTables(){
  const body=$('#tabbody');
  body.innerHTML=`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px"></div>`;
  const grid=body.firstChild;
  Object.keys(GROUPS).forEach(g=>{ const t=computeGroupTable(g);
    grid.appendChild(el(`<div class="card" style="padding:14px"><div class="grp-h" style="margin:0 0 8px">Grupo ${g}</div>
      <table><thead><tr><th>#</th><th>Equipo</th><th class="r">PJ</th><th class="r">DG</th><th class="r">Pts</th></tr></thead><tbody>
      ${t.map((x,i)=>`<tr style="${i<2?'background:rgba(25,230,140,.07)':''}"><td class="muted">${i+1}</td>
        <td><span class="flag" style="font-size:16px">${x.flag}</span> ${escapeHtml(x.name)}</td>
        <td class="r">${x.pj}</td><td class="r">${x.dg>0?'+':''}${x.dg}</td><td class="r"><b>${x.pts}</b></td></tr>`).join('')}
      </tbody></table><div class="tiny muted" style="margin-top:6px">Verde = 1° y 2° (clasificación directa)</div></div>`)); });
}

function computeOutcome(m,hg,ag){ if(m.phase!=='grupos') return hg>ag?'L':'V'; return hg>ag?'L':hg<ag?'V':'E'; }
async function saveResult(mid){

/* ---------- cerrar grupos -> ronda final ---------- */
function confirmCloseGroups(){
  const pend=MATCHES.filter(m=>m.phase==='grupos'&&m.status!=='final').length;
  openModal(`<h2 class="section">Cerrar fase de grupos</h2>
    <p class="small">Se calcularán los 2 primeros de cada grupo + los 8 mejores terceros y se armará el borrador de dieciseisavos.</p>
    ${pend?`<div class="banner" style="border-color:var(--pink)">⚠ Hay <b>${pend}</b> partido(s) de grupos sin resultado. Mejor captúralos antes.</div>`:''}
    <div style="height:12px"></div>
    <button class="btn pink" onclick="closeGroups()">Sí, armar ronda final</button>
    <button class="btn ghost" style="margin-left:8px" onclick="closeModal()">Cancelar</button>`);
}
async function closeGroups(){
  const firsts=[],seconds=[],thirds=[];
  Object.keys(GROUPS).forEach(g=>{const t=computeGroupTable(g);firsts.push({...t[0],g});seconds.push({...t[1],g});thirds.push({...t[2],g});});
  thirds.sort((a,b)=> b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
  const order=[...firsts, ...thirds.slice(0,8), ...seconds]; // 12 + 8 + 12 = 32
  const r32=[];
  for(let i=0;i<order.length;i+=2){ const a=order[i],b=order[i+1];
    r32.push({id:'K'+(i/2+1),phase:'16avos',label:'Dieciseisavos · cruce '+(i/2+1),
      home:a.name,away:b.name,kickoff:'2026-06-'+pad(28+Math.floor(i/2/3))+'T13:00:00-06:00',venue:''}); }
  META.knockout=r32; META.phase='eliminatoria'; META.groups_closed=true;
  try{ await sbPatch('meta','id=eq.1',{knockout:r32,phase:'eliminatoria',groups_closed:true});
